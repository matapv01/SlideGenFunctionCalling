<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Roboto, Arial, sans-serif;
            background-color: #F0F0F0;
        }
        .left-section {
            background-color: #2C4B7D;
            color: white;
            display: flex;
            justify-content: top;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            z-index: 1;
        }
        .left-section .number {
            font-size: 120px;
            font-weight: bold;
            margin-top: 80px;
        }
        .right-section {
            background-color: #F0F0F0;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 20px;
            z-index: 2;
        }
        .image-placeholder {
            background-color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #000;
            height: 250px;
        }
        .bottom-right {
            background-color: white;
            padding: 50px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: row;
            margin-left: -40%;
            margin-right: 10%;
            height: 50%;
        }
        .bottom-right .title {
            font-size: 64px;
            font-weight: bold;
            color: #2C4B7D;
            margin: 0;
        }
        .bottom-right .description {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            margin: 0;
            width: 50%;
        }
        .divider {
            width: 2px;
            height: 100px;
            background-color: #000;
            margin: 0 30px;
        }
    </style>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row h-100">
            <div class="col-md-4 d-flex flex-column align-items-center left-section">
                <div class="number">03</div>
            </div>
            <div class="col-md-8 d-flex flex-column justify-content-between right-section">
                <div class="row top-right">
                    <div class="col-md-6 image-placeholder">Chatbots như GPT, Claude, Gemini Placeholder</div>
                    <div class="col-md-6 image-placeholder">YouTube, Facebook Channels Placeholder</div>
                </div>
                <div class="bottom-right">
                    <div class="col-md-4 title">Tổng Kết</div>
                    <div class="divider"></div>
                    <div class="col-md-4 description">
                        Nhân lực và cơ sở hạ tầng cần cải thiện. Học từ khóa học trực tuyến, tài liệu, chatbots, và kênh trao đổi kiến thức. AI là yếu tố chiến lược quan trọng.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
