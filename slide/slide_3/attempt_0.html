<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <title>Làm việc và Học hỏi của AI</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: Roboto, Arial, sans-serif;
            background-color: #FFFFFF;
        }

        .slide-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #FFFFFF;
        }

        .content-box {
            display: flex;
            flex-direction: row;
            background-color: #FFFFFF;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 85%;
            padding: 20px;
            color: #333;
        }

        .text-section {
            flex: 1;
            padding: 20px;
            margin-right: 20px;
            color: #2f4f4f;
        }

        .image-box {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e1e5ea;
            border-radius: 10px;
        }

        h1 {
            color: #3B5998;
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6em;
        }

        strong {
            color: #ff4500;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <div class="content-box">
            <div class="text-section">
                <h1>Làm việc và Học hỏi của AI</h1>
                <p>AI có thể thực hiện nhiều công việc như nhận diện khuôn mặt, trò chuyện với trợ lý ảo, hoặc chơi game. Nó cũng có thể học từ kinh nghiệm và ra quyết định dựa trên dữ liệu.</p>
            </div>
            <div class="image-box">
                <p style="color: #777;">Image Placeholder</p>
            </div>
        </div>
    </div>
</body>

</html>
